name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint API Gateway
        run: ruff check services/api-gateway/

      - name: Lint Transcoding Worker
        run: ruff check services/transcoding-worker/

  build-api-gateway:
    name: Build API Gateway Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image (no push)
        run: |
          docker build \
            -t api-gateway:test \
            services/api-gateway/

  build-transcoding-worker:
    name: Build Transcoding Worker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image (no push)
        run: |
          docker build \
            -t transcoding-worker:test \
            services/transcoding-worker/
