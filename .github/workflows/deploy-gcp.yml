name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after plan?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  PROJECT_ID: k8s-transcoding-plattform
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/k8s-transcoding-plattform/transcoding
  CLUSTER_NAME: video-transcoding
  NAMESPACE: video-transcoding

jobs:
  # ------------------------------------------------------------------
  # Job 1: Docker Images bauen und in Artifact Registry pushen
  # ------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push API Gateway
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/api-gateway:latest \
            -t ${{ env.REGISTRY }}/api-gateway:${{ github.sha }} \
            services/api-gateway/
          docker push ${{ env.REGISTRY }}/api-gateway:latest
          docker push ${{ env.REGISTRY }}/api-gateway:${{ github.sha }}

      - name: Build & Push Transcoding Worker
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/transcoding-worker:latest \
            -t ${{ env.REGISTRY }}/transcoding-worker:${{ github.sha }} \
            services/transcoding-worker/
          docker push ${{ env.REGISTRY }}/transcoding-worker:latest
          docker push ${{ env.REGISTRY }}/transcoding-worker:${{ github.sha }}

  # ------------------------------------------------------------------
  # Job 2: Terraform Validate, Format Check & Plan
  # ------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: terraform/gcp
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform/gcp
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/gcp
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/gcp
        run: terraform plan

  # ------------------------------------------------------------------
  # Job 3: Terraform Apply + kubectl rollout restart
  # Wird nur ausgeführt wenn workflow_dispatch mit apply=true
  # ------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply & Deploy
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == 'true' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: terraform/gcp
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/gcp
        run: terraform apply -auto-approve

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f kubernetes/gke/00-namespace.yaml
          kubectl apply -f kubernetes/gke/01-configmap.yaml
          kubectl apply -f kubernetes/gke/02-service-accounts.yaml
          kubectl apply -f kubernetes/gke/api-gateway/

      - name: Rollout Restart API Gateway
        run: |
          kubectl rollout restart deployment/api-gateway -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/api-gateway -n ${{ env.NAMESPACE }}