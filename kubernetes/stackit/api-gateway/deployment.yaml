apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: video-transcoding
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: api-gateway
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: api-gateway
          image: registry.eu01.onstackit.cloud/video-transcoding/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # Storage Provider: s3 → S3Client via boto3
            - name: STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: storage_provider

            # S3 Endpoint und Region
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: s3_endpoint
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: s3_region

            # S3 Credentials aus Secret
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key

            # Worker bekommt dieselben Credentials weitergegeben
            - name: WORKER_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: WORKER_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key

            - name: IMAGE_PULL_POLICY
              value: "Always"
            - name: TRANSCODING_WORKER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: worker_image
            - name: INPUT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: input_bucket
            - name: OUTPUT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: output_bucket
            - name: K8S_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: k8s_namespace

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10