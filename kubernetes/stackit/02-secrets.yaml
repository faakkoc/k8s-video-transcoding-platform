# WICHTIG: Diese Datei ist ein Template — echte Credentials NICHT einchecken!
# Das Secret wird durch die CI/CD Pipeline oder manuell via kubectl erstellt:
#
# kubectl create secret generic s3-credentials \
#   --from-literal=access-key=$(terraform output -raw object_storage_access_key) \
#   --from-literal=secret-key=$(terraform output -raw object_storage_secret_key) \
#   -n video-transcoding \
#   --dry-run=client -o yaml | kubectl apply -f -
#
# Unterschied zu GCP: Kein Workload Identity auf StackIT →
# Credentials müssen explizit als Secret hinterlegt werden.
# Dies ist ein bewusster Cloud-Architektur-Unterschied (dokumentiert in
# docs/03-design-decisions/storage-abstraction.md).

apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: video-transcoding
type: Opaque
stringData:
  access-key: "PLACEHOLDER_REPLACE_WITH_TERRAFORM_OUTPUT"
  secret-key: "PLACEHOLDER_REPLACE_WITH_TERRAFORM_OUTPUT"