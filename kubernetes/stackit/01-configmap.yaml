apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: video-transcoding
data:
  # StackIT Object Storage Buckets (von Terraform erstellt)
  input_bucket:  "k8s-transcoding-uploads"
  output_bucket: "k8s-transcoding-outputs"

  # S3-kompatibler Endpoint für StackIT Object Storage
  s3_endpoint: "https://object.storage.eu01.onstackit.cloud"
  s3_region:   "eu01"

  # Storage Provider: s3 → S3Client via boto3
  # Credentials kommen aus dem Secret "s3-credentials"
  # (erstellt via kubectl aus Terraform Output, siehe docs/05-deployment/stackit-deployment.md)
  storage_provider: "s3"

  # Kubernetes
  k8s_namespace: "video-transcoding"

  # Name des Kubernetes Secrets mit S3-Credentials (für Worker Jobs)
  s3_secret_name: "s3-credentials"

  # Worker Image aus StackIT Harbor Container Registry
  worker_image: "registry.onstackit.cloud/video-transcoding/transcoding-worker:latest"