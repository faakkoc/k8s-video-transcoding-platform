apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: video-transcoding
  labels:
    app: api-gateway
    component: backend
spec:
  # LoadBalancer: GKE creates a Google Cloud Load Balancer with a public IP
  # This is the main difference from local (ClusterIP + port-forward)
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  sessionAffinity: None