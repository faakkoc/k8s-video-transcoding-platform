apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: video-transcoding
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: api-gateway
      containers:
        - name: api-gateway
          image: us-east1-docker.pkg.dev/k8s-transcoding-plattform/transcoding/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # Storage Provider: gcs uses Workload Identity (no credentials needed)
            - name: STORAGE_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: storage_provider

            # Image Pull Policy für Worker-Jobs
            - name: IMAGE_PULL_POLICY
              value: "Always"

            # Worker Image aus ConfigMap
            - name: TRANSCODING_WORKER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: worker_image

            # GCS Bucket-Konfiguration
            - name: INPUT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: input_bucket
            - name: OUTPUT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: output_bucket

            # Kubernetes Namespace
            - name: K8S_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: k8s_namespace

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10