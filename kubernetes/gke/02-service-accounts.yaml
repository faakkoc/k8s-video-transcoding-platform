apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: video-transcoding
  annotations:
    # Workload Identity: links this K8s ServiceAccount to the GCP ServiceAccount
    # This allows the pod to access GCS without any credentials in code
    iam.gke.io/gcp-service-account: api-gateway@k8s-transcoding-plattform.iam.gserviceaccount.com
  labels:
    app: api-gateway

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transcoding-worker
  namespace: video-transcoding
  annotations:
    iam.gke.io/gcp-service-account: transcoding-worker@k8s-transcoding-plattform.iam.gserviceaccount.com
  labels:
    app: transcoding-worker

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: video-transcoding
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-rolebinding
  namespace: video-transcoding
subjects:
  - kind: ServiceAccount
    name: api-gateway
    namespace: video-transcoding
roleRef:
  kind: Role
  name: api-gateway-role
  apiGroup: rbac.authorization.k8s.io